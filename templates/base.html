<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junto — Do More Together</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #faf8f3; color: #2c1a00; }
        nav {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(250,248,243,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 0.5px solid #e8e0d0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .logo {
            color: #2c1a00;
            font-size: 20px;
            font-weight: 500;
        }
        nav a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            margin-left: 20px;
        }
        nav a:hover { color: #2c1a00; }
        nav .nav-cta {
            background: #d4600a;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-left: 16px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav>
        <span class="logo">⚡ Junto</span>
        <div>
            <a href="/">Home</a>
            <a href="/feed">Feed</a>
            <a href="/feed" class="nav-cta">Browse activities</a>
        </div>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
